#!/bin/bash
# Alternative: Use Docker for Fuseki
# This is a Docker Compose setup for Fuseki

version: '3.8'

services:
  fuseki:
    image: stain/jena-fuseki:latest
    ports:
      - "3030:3030"
    environment:
      FUSEKI_PASSWORD: "admin"
      FUSEKI_MEMORY: "1024m"
    volumes:
      - fuseki-data:/fuseki
    command: /fuseki-server --mem /nusarasa

volumes:
  fuseki-data:
